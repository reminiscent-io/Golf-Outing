kind = "web"
previewPath = "/"
title = "Golf Trip Scorecard"
version = "1.0.0"
id = "artifacts/golf-scorecard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20768

[services.development]
run = "pnpm --filter @workspace/golf-scorecard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/golf-scorecard", "run", "build" ]
publicDir = "artifacts/golf-scorecard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20768"
BASE_PATH = "/"

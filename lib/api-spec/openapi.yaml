openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Golf Trip Live Scorecard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Phone+OTP authentication
  - name: users
    description: Current user account operations
  - name: trips
    description: Golf trip operations
  - name: players
    description: Player operations
  - name: rounds
    description: Round operations
  - name: scores
    description: Score entry operations
  - name: leaderboard
    description: Leaderboard & stats
  - name: groups
    description: Per-round foursome assignments

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /trips:
    get:
      operationId: listTrips
      tags: [trips]
      summary: List all golf trips
      responses:
        "200":
          description: List of trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trip"
    post:
      operationId: createTrip
      tags: [trips]
      summary: Create a new golf trip
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTripBody"
      responses:
        "201":
          description: Created trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "401":
          description: Unauthorized

  /trips/{tripId}:
    get:
      operationId: getTrip
      tags: [trips]
      summary: Get a trip by ID
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "404":
          description: Not found
    patch:
      operationId: updateTrip
      tags: [trips]
      summary: Update a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTripBody"
      responses:
        "200":
          description: Updated trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
    delete:
      operationId: deleteTrip
      tags: [trips]
      summary: Delete a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /auth/request-otp:
    post:
      operationId: requestOtp
      tags: [auth]
      summary: Request a 6-digit OTP sent via SMS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestOtpBody"
      responses:
        "200":
          description: OTP issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestOtpResponse"
        "429":
          description: Rate limited

  /auth/verify-otp:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify a 6-digit OTP and return a 30d JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpBody"
      responses:
        "200":
          description: Verified; token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "400":
          description: Bad code or missing full name for new user
        "401":
          description: OTP not valid

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get the current user from a bearer JWT
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /auth/refresh:
    post:
      operationId: refreshSession
      tags: [auth]
      summary: Issue a new 30d JWT for the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          description: Unauthorized

  /users/me/trips:
    get:
      operationId: listMyTrips
      tags: [users]
      summary: List trips associated with the current user (via player link or saved)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of user-trip associations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserTripAssociation"
        "401":
          description: Unauthorized

  /users/me/trips/{tripId}:
    post:
      operationId: saveTrip
      tags: [users]
      summary: Save (follow) a trip to the current user's account
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Saved
        "401":
          description: Unauthorized
        "404":
          description: Trip not found
    delete:
      operationId: unsaveTrip
      tags: [users]
      summary: Unsave a trip from the current user's account
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed
        "401":
          description: Unauthorized

  /trips/{tripId}/players:
    get:
      operationId: listPlayers
      tags: [players]
      summary: List players in a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of players
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Player"
    post:
      operationId: createPlayer
      tags: [players]
      summary: Add a player to a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlayerBody"
      responses:
        "201":
          description: Created player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /trips/{tripId}/players/{playerId}:
    patch:
      operationId: updatePlayer
      tags: [players]
      summary: Update a player
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlayerBody"
      responses:
        "200":
          description: Updated player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
    delete:
      operationId: deletePlayer
      tags: [players]
      summary: Remove a player
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /trips/{tripId}/rounds:
    get:
      operationId: listRounds
      tags: [rounds]
      summary: List rounds in a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of rounds
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Round"
    post:
      operationId: createRound
      tags: [rounds]
      summary: Create a round in a trip
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoundBody"
      responses:
        "201":
          description: Created round
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Round"
        "401":
          description: Unauthorized
        "403":
          description: Caller is not a player or follower of this trip

  /trips/{tripId}/rounds/{roundId}:
    get:
      operationId: getRound
      tags: [rounds]
      summary: Get a round
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: roundId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Round
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Round"
        "404":
          description: Not found
    patch:
      operationId: updateRound
      tags: [rounds]
      summary: Update a round (course info, par, hcp index, games config)
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: roundId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoundBody"
      responses:
        "200":
          description: Updated round
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Round"
    delete:
      operationId: deleteRound
      tags: [rounds]
      summary: Delete a round
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: roundId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /trips/{tripId}/rounds/{roundId}/scores:
    get:
      operationId: getScores
      tags: [scores]
      summary: Get all scores for a round
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: roundId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: All scores for the round (array of per-player score entries)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayerScore"
    put:
      operationId: upsertScore
      tags: [scores]
      summary: Set/update a single hole score for a player
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: roundId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertScoreBody"
      responses:
        "200":
          description: Updated score entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerScore"

  /trips/{tripId}/rounds/{roundId}/scramble-scores:
    get:
      operationId: getScrambleScores
      tags: [scores]
      summary: Get all scramble team scores for a round
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: roundId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: All scramble team score rows for the round
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrambleScores"
    put:
      operationId: upsertScrambleScore
      tags: [scores]
      summary: Set/update a single hole score for a scramble team
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: roundId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertScrambleScoreBody"
      responses:
        "200":
          description: Updated scramble team score row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrambleTeamScore"

  /trips/{tripId}/rounds/{roundId}/leaderboard:
    get:
      operationId: getRoundLeaderboard
      tags: [leaderboard]
      summary: Get computed leaderboard for a round (net stroke, stableford, skins, nassau)
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: roundId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Leaderboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoundLeaderboard"

  /trips/{tripId}/rounds/{roundId}/groups:
    get:
      operationId: listRoundGroups
      tags: [groups]
      summary: List foursome assignments for a round
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: roundId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Group assignments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoundGroupAssignments"
    put:
      operationId: putRoundGroups
      tags: [groups]
      summary: Replace all foursome assignments for a round
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: roundId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoundGroupAssignments"
      responses:
        "200":
          description: Saved assignments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoundGroupAssignments"
        "400":
          description: One or more players do not belong to this trip
        "404":
          description: Round not found or not part of the trip

  /trips/{tripId}/leaderboard:
    get:
      operationId: getTripLeaderboard
      tags: [leaderboard]
      summary: Get trip-wide leaderboard (aggregated across all rounds)
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trip leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripLeaderboard"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Trip:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - createdAt
        - updatedAt

    CreateTripBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
      required:
        - name

    UpdateTripBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]

    User:
      type: object
      properties:
        id:
          type: integer
        phone:
          type: string
          description: E.164-formatted phone number
        fullName:
          type: string
        createdAt:
          type: string
      required:
        - id
        - phone
        - fullName
        - createdAt

    RequestOtpBody:
      type: object
      properties:
        phone:
          type: string
          description: E.164-formatted phone number
        fullName:
          type: string
          description: Optional. Only honored if a brand-new user is created at verify time.
      required:
        - phone

    RequestOtpResponse:
      type: object
      properties:
        ok:
          type: boolean
        expiresAt:
          type: string
        isNewUser:
          type: boolean
      required:
        - ok
        - expiresAt
        - isNewUser

    VerifyOtpBody:
      type: object
      properties:
        phone:
          type: string
        code:
          type: string
          minLength: 6
          maxLength: 6
        fullName:
          type: string
          description: Required when verifying for a phone number that has no user yet.
      required:
        - phone
        - code

    AuthSession:
      type: object
      properties:
        token:
          type: string
        expiresAt:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - expiresAt
        - user

    UserTripAssociation:
      type: object
      properties:
        trip:
          $ref: "#/components/schemas/Trip"
        via:
          type: string
          enum: [player, saved, both]
        players:
          type: array
          items:
            $ref: "#/components/schemas/Player"
      required:
        - trip
        - via
        - players

    Player:
      type: object
      properties:
        id:
          type: integer
        tripId:
          type: integer
        userId:
          type: ["integer", "null"]
        name:
          type: string
        handicap:
          type: number
        createdAt:
          type: string
      required:
        - id
        - tripId
        - name
        - handicap
        - createdAt

    CreatePlayerBody:
      type: object
      properties:
        name:
          type: string
        handicap:
          type: number
        userId:
          type: ["integer", "null"]
      required:
        - name
        - handicap

    UpdatePlayerBody:
      type: object
      properties:
        name:
          type: string
        handicap:
          type: number
        userId:
          type: ["integer", "null"]

    Round:
      type: object
      properties:
        id:
          type: integer
        tripId:
          type: integer
        name:
          type: string
        course:
          type: ["string", "null"]
        date:
          type: ["string", "null"]
        par:
          type: array
          items:
            type: integer
          description: 18 values - par for each hole
        holeHcp:
          type: array
          items:
            type: integer
          description: 18 values - handicap stroke index for each hole (1-18)
        gamesConfig:
          $ref: "#/components/schemas/GamesConfig"
        handicapMode:
          type: string
          enum: [net, gross]
          description: "net = course-adjusted (low plays scratch); gross = use raw handicap"
        teeBox:
          type: ["string", "null"]
        courseRating:
          type: ["number", "null"]
        courseSlope:
          type: ["integer", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - tripId
        - name
        - par
        - holeHcp
        - gamesConfig
        - handicapMode
        - createdAt
        - updatedAt

    GamesConfig:
      type: object
      properties:
        stableford:
          type: boolean
        skins:
          type: boolean
        nassau:
          type: boolean
        netStroke:
          type: boolean
        bestBall:
          type: boolean
        bestBallTeams:
          type: array
          items:
            $ref: "#/components/schemas/Team"
        matchPlay:
          type: boolean
        matchPlayMatches:
          type: array
          items:
            $ref: "#/components/schemas/Match"
        scramble:
          type: boolean
          description: When true, scramble replaces individual game modes for this round.
        scrambleType:
          type: ["string", "null"]
          enum: ["fourMan", "twoMan", null]
          description: "fourMan = whole group is one team. twoMan = slots 1-2 and 3-4 form two cart teams."
      required:
        - stableford
        - skins
        - nassau
        - netStroke
        - bestBall
        - matchPlay

    Team:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        playerIds:
          type: array
          items:
            type: integer
      required:
        - id
        - name
        - playerIds

    Match:
      type: object
      properties:
        id:
          type: string
        playerA:
          type: integer
        playerB:
          type: integer
      required:
        - id
        - playerA
        - playerB

    CreateRoundBody:
      type: object
      properties:
        name:
          type: string
        course:
          type: ["string", "null"]
        date:
          type: ["string", "null"]
        par:
          type: array
          items:
            type: integer
        holeHcp:
          type: array
          items:
            type: integer
        gamesConfig:
          $ref: "#/components/schemas/GamesConfig"
        handicapMode:
          type: string
          enum: [net, gross]
        teeBox:
          type: ["string", "null"]
        courseRating:
          type: ["number", "null"]
        courseSlope:
          type: ["integer", "null"]
      required:
        - name

    UpdateRoundBody:
      type: object
      properties:
        name:
          type: string
        course:
          type: ["string", "null"]
        date:
          type: ["string", "null"]
        par:
          type: array
          items:
            type: integer
        holeHcp:
          type: array
          items:
            type: integer
        gamesConfig:
          $ref: "#/components/schemas/GamesConfig"
        handicapMode:
          type: string
          enum: [net, gross]
        teeBox:
          type: ["string", "null"]
        courseRating:
          type: ["number", "null"]
        courseSlope:
          type: ["integer", "null"]

    PlayerScore:
      type: object
      properties:
        id:
          type: integer
        roundId:
          type: integer
        playerId:
          type: integer
        holeScores:
          type: array
          items:
            type: ["integer", "null"]
          description: 18 values - gross score per hole (null = not entered)
      required:
        - id
        - roundId
        - playerId
        - holeScores

    UpsertScoreBody:
      type: object
      properties:
        playerId:
          type: integer
        hole:
          type: integer
          description: Hole number 1-18
        score:
          type: ["integer", "null"]
          description: Gross score (null to clear)
      required:
        - playerId
        - hole

    PlayerLeaderboardEntry:
      type: object
      properties:
        playerId:
          type: integer
        playerName:
          type: string
        handicap:
          type: number
        grossTotal:
          type: ["integer", "null"]
        netTotal:
          type: ["integer", "null"]
        stablefordTotal:
          type: ["integer", "null"]
        skinsWon:
          type: integer
        holesPlayed:
          type: integer
      required:
        - playerId
        - playerName
        - handicap
        - skinsWon
        - holesPlayed

    SkinHoleResult:
      type: object
      properties:
        hole:
          type: integer
        winnerId:
          type: ["integer", "null"]
        winnerName:
          type: ["string", "null"]
        carry:
          type: integer
        tied:
          type: boolean
      required:
        - hole
        - carry
        - tied

    NassauResult:
      type: object
      properties:
        matches:
          type: array
          items:
            $ref: "#/components/schemas/TeamNassauMatch"
      required:
        - matches

    TeamNassauMatch:
      type: object
      properties:
        groupNumber:
          type: integer
        teamA:
          type: integer
        teamB:
          type: integer
        teamAPlayerIds:
          type: array
          items:
            type: integer
        teamBPlayerIds:
          type: array
          items:
            type: integer
        front:
          type: ["string", "null"]
          enum: ["A", "B", "halved", null]
        back:
          type: ["string", "null"]
          enum: ["A", "B", "halved", null]
        total:
          type: ["string", "null"]
          enum: ["A", "B", "halved", null]
        frontMargin:
          type: integer
        backMargin:
          type: integer
        totalMargin:
          type: integer
      required:
        - groupNumber
        - teamA
        - teamB
